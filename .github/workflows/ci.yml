name: CI

on:
  push:
    branches: [develop, main, enterprise-hardening]
  pull_request:
    branches: [develop, main, enterprise-hardening]

permissions:
  contents: read
  security-events: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build & test
        run: ./gradlew clean build --no-daemon

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/reports/tests/**"

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the gitleaks CLI (MIT, free) instead of gitleaks-action@v2, which
      # requires a paid GITLEAKS_LICENSE for org-owned repos. `detect` exits
      # non-zero on a finding, so CI still fails on a leaked secret.
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact --no-banner

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Build
        run: ./gradlew :lims-core-service-app:compileJava --no-daemon
      - name: Analyze
        uses: github/codeql-action/analyze@v3
