server:
  port: 11000

spring:
  application:
    name: lims-core-service

  datasource:
    url: jdbc:postgresql://localhost:5433/durdans_lims_db
    username: postgres
    password: eta8827
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:/liquibase/master.xml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/lims-realm

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: lims-dispatch-ingress
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: kalanasandakelum51@gmail.com
    password: qhaiuuwoatrdfnkr
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000
        debug: false

  cloud:
    aws:
      region: us-east-1
      credentials:
        access-key: test
        secret-key: test
      s3:
        bucket: lims-patient-documents
      endpoint: http://localhost:4566

app:
  billing:
    service-charge-percentage: 5
    overdue-threshold-hours: 24

  services:
    patient-base-url: http://localhost:11000

  kafka:
    lab-report-listener-enabled: false
    topics:
      lab-report-authorized: lab.report.authorized

  file:
    max-size: 10485760
    allowed-types:
      - application/pdf
      - image/jpeg
      - image/png
    allowed-extensions:
      - pdf
      - png
      - jpg
      - jpeg

  verification:
    base-url: http://localhost:11000
