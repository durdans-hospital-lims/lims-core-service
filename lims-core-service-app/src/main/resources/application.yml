server:
  port: 11000

spring:
  application:
    name: lims-core-service

  datasource:
    # Secrets are externalized. Defaults are safe local/docker values only —
    # the real password belongs in application-local.yml (git-ignored) or the
    # DB_PASSWORD env var. NEVER commit a real credential here.
    url: ${DB_URL:jdbc:postgresql://localhost:5433/durdans_lims_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:/liquibase/master.xml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/lims-realm

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: lims-dispatch-ingress
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false

  mail:
    host: smtp.gmail.com
    port: 587
    # No default: mail is disabled until MAIL_USERNAME/MAIL_PASSWORD are supplied
    # (env or application-local.yml). Do NOT commit a working mail credential.
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000
        debug: false

  cloud:
    aws:
      region: us-east-1
      credentials:
        # test/test are LocalStack defaults (not real secrets). Override with
        # AWS_ACCESS_KEY/AWS_SECRET_KEY in real environments.
        access-key: ${AWS_ACCESS_KEY:test}
        secret-key: ${AWS_SECRET_KEY:test}
      s3:
        bucket: lims-patient-documents
      endpoint: http://localhost:4566

app:
  billing:
    service-charge-percentage: 5
    overdue-threshold-hours: 24

  services:
    patient-base-url: http://localhost:11000

  kafka:
    lab-report-listener-enabled: false
    topics:
      lab-report-authorized: lab.report.authorized

  file:
    max-size: 10485760
    allowed-types:
      - application/pdf
      - image/jpeg
      - image/png
    allowed-extensions:
      - pdf
      - png
      - jpg
      - jpeg

  verification:
    base-url: http://localhost:11000

  # Instrument integration (ASTM). Disabled by default so it does not bind a port
  # without an analyzer/simulator. Enable, then run the simulator's analyzer mode
  # against this port to demo the machine -> middleware -> LIMS loop.
  instrument:
    listener:
      enabled: false
      port: 12000
      instrument-id: ASTM-IN-01

# Observability: liveness/readiness probes + Prometheus metrics. Only health/info
# are public (see SecurityConfig); everything else under /actuator requires
# SUPER_ADMIN.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  info:
    env:
      enabled: false
