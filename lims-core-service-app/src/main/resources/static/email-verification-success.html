<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified - Durdans LIMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background-light min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden">
        <div class="bg-background-dark p-8 text-center">
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="w-10 h-10 bg-primary rounded flex items-center justify-center">
                    <span class="material-icons text-white">local_hospital</span>
                </div>
                <span class="text-2xl font-bold tracking-tight text-white">DURDANS <span
                        class="text-primary">ERP</span></span>
            </div>
        </div>

        <div class="p-8 text-center">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="material-icons text-green-500 text-4xl">check_circle</span>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-2">Email Verified!</h1>
            <p class="text-gray-600 mb-8">Your email address has been successfully verified. You can now access all
                features of the Patient Management System.</p>

            <p class="text-gray-500 italic text-sm mt-4">You may now close this window.</p>

            <div class="mt-8 pt-6 border-t border-gray-100">
                <p class="text-xs text-gray-400">
                    &copy;
                    <script>document.write(new Date().getFullYear())</script> Durdans Hospital. All Rights Reserved.
                </p>
            </div>
        </div>
    </div>
</body>

</html>
